<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>我的网站</title>
    <style>
        /* 旋转唱片样式 */
        .record {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 999;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-image: url('https://picsum.photos/id/100/200/200');
            background-size: cover;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            animation: rotate 8s linear infinite;
            cursor: pointer;
        }
        .record:hover {
            animation-play-state: paused;
            transform: scale(1.1);
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body style="background:#222;color:#fff;font-size:24px;text-align:center;padding-top:100px;">
    <h1>这是我的网页</h1>
    <p>别人可以通过网址访问我啦</p>

    <!-- 右下角旋转唱片 -->
    <div class="record"></div>
</body>
</html>
