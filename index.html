<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }
        /* 稳定加载的山水樱花背景 */
        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url("https://picsum.photos/id/1039/1920/1080") center/cover no-repeat;
            z-index: -2;
        }
        /* 樱花飘落容器 */
        #sakura {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }
        /* 花瓣样式 */
        .petal {
            position: absolute;
            background: #ffb6c1;
            border-radius: 150% 0 150% 150%;
            opacity: 0.8;
            animation: fall linear infinite;
        }
        /* 飘落动画 */
        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.8);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(100vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div id="sakura"></div>

    <script>
        function createSakura() {
        const container = document.getElementById('sakura');
        container.innerHTML = '';
        // 响应式花瓣数量
        const count = window.innerWidth < 768 ? 40 : 70;

        for (let i = 0; i < count; i++) {
        const petal = document.createElement('div');
        petal.className = 'petal';

        // 随机大小、位置、速度
        const size = Math.random() * 12 + 6;
        const left = Math.random() * 100;
        const dur = Math.random() * 15 + 10;
        const delay = Math.random() * 15;

        petal.style.width = size + 'px';
        petal.style.height = size + 'px';
        petal.style.left = left + '%';
        petal.style.animationDuration = dur + 's';
        petal.style.animationDelay = delay + 's';

        // 粉色深浅随机
        const r = Math.floor(Math.random() * 40) + 220;
        const g = Math.floor(Math.random() * 30) + 180;
        const b = Math.floor(Math.random() * 30) + 210;
        petal.style.backgroundColor = `rgb(${r},${g},${b})`;

        container.appendChild(petal);
        }
        }

        window.addEventListener('load', createSakura);
        window.addEventListener('resize', createSakura);
    </script>
</body>
</html>
