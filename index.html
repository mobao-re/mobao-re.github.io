<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html, body {
            height: 100%;
            overflow: hidden
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("https://images.unsplash.com/photo-1559510014-b9174ff62dc5") center/cover no-repeat;
            z-index: -1;
        }

        #sakura {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .petal {
            position: absolute;
            background: #ffdae3;
            border-radius: 50% 0 50% 50%;
            opacity: .75;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 0
            }

            10% {
                opacity: .85
            }

            90% {
                opacity: .85
            }

            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div id="sakura"></div>
    <script>
        function createSakura(){
        const s=document.getElementById('sakura');
        s.innerHTML='';
        const c=innerWidth<768?40:70;
        for(let i=0;i<c;i++){
        const p=document.createElement('div');
        p.className='petal';
        const size=Math.random()*12+6;
        p.style.width=p.style.height=size+'px';
        p.style.left=Math.random()*100+'%';
        p.style.animationDuration=(Math.random()*15+10)+'s';
        p.style.animationDelay=(Math.random()*15)+'s';
        const r=255,g=Math.floor(Math.random()*60+180),b=Math.floor(Math.random()*60+200);
        p.style.backgroundColor=`rgb(${r},${g},${b})`;
        s.appendChild(p);
        }
        }
        window.addEventListener('load',createSakura);
        window.addEventListener('resize',createSakura);
    </script>
</body>
</html>
