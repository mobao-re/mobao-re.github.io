<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }
        /* 动漫风樱花山水背景（稳定可访问） */
        .anime-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: url("https://picsum.photos/id/240/1920/1080") center/cover no-repeat;
            z-index: -2;
            filter: brightness(0.95);
        }
        /* 樱花飘落容器 */
        #sakura-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }
        /* 动漫感樱花花瓣样式 */
        .sakura-petal {
            position: absolute;
            background: #ffd6e8;
            border-radius: 150% 0 150% 150%;
            opacity: 0.8;
            animation: sakura-fall linear infinite;
        }
        /* 樱花飘落动画（带旋转、缩放，更自然） */
        @keyframes sakura-fall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(0.7);
                opacity: 0;
            }

            10% {
                opacity: 0.9;
            }

            90% {
                opacity: 0.9;
            }

            100% {
                transform: translateY(100vh) rotate(720deg) scale(1.3);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 动漫风背景层 -->
    <div class="anime-bg"></div>
    <!-- 樱花飘落层 -->
    <div id="sakura-container"></div>

    <script>
        // 生成樱花花瓣
        function createSakuraPetals() {
        const container = document.getElementById('sakura-container');
        container.innerHTML = '';

        // 响应式花瓣数量：移动端40，桌面端70
        const petalCount = window.innerWidth < 768 ? 40 : 70;

        for (let i = 0; i < petalCount; i++) {
        const petal = document.createElement('div');
        petal.className = 'sakura-petal';

        // 随机大小（6-18px，更有层次感）
        const size = Math.random() * 12 + 6;
        // 随机水平位置（0-100%）
        const leftPos = Math.random() * 100;
        // 随机飘落时长（10-25s，速度不一）
        const fallDuration = Math.random() * 15 + 10;
        // 随机延迟（0-15s，避免同时飘落）
        const fallDelay = Math.random() * 15;

        // 设置花瓣样式
        petal.style.width = `${size}px`;
        petal.style.height = `${size}px`;
        petal.style.left = `${leftPos}%`;
        petal.style.animationDuration = `${fallDuration}s`;
        petal.style.animationDelay = `${fallDelay}s`;

        // 随机粉色深浅（动漫感柔和色调）
        const r = Math.floor(Math.random() * 30) + 240;
        const g = Math.floor(Math.random() * 40) + 200;
        const b = Math.floor(Math.random() * 40) + 220;
        petal.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

        container.appendChild(petal);
        }
        }

        // 页面加载完成后生成花瓣
        window.addEventListener('load', createSakuraPetals);
        // 窗口大小变化时重新生成（适配不同屏幕）
        window.addEventListener('resize', createSakuraPetals);
    </script>
</body>
</html>
